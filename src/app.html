<!doctype html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Interactive Report Design by SandraViz</title>
		<meta
			name="description"
			content="A scrollytelling report with animated charts — interactive report design by SandraViz. Want your report like this? Get in touch at sandraviz.com."
		/>
		<meta name="robots" content="noindex, nofollow" />
		<style>
			/* Pin Tailwind's cascade layer order before any bundled CSS loads.
			   Vite 8 (Rolldown) hoists the empty `@layer components;` statement above
			   `base` in the built CSS, which makes base styles beat component styles. */
			@layer properties, theme, base, components, utilities;

			html,
			body {
				height: 100%;
				margin: 0;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="height: 100%">
		<div style="display: contents; height: 100%">%sveltekit.body%</div>
	</body>
</html>
